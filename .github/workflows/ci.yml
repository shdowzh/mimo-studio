name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck -- --pretty 2>&1 | true
      - name: Test
        run: npm test
      - name: Build (Vite)
        run: npm run build
