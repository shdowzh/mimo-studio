name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS (x64 + arm64) ──────────────────────────────────
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npx vite build
      # 不内置 MiMo CLI — 用户首次启动时自动下载（优先码云镜像）
      - name: Build macOS (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: release/MiMo-Studio-*.dmg

  # ── Linux (AppImage + deb) ───────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: |
          sudo apt-get update && sudo apt-get install -y ruby
          sudo gem install fpm
      - run: npm install
      - run: npx vite build
      # 不内置 MiMo CLI — 用户首次启动时自动下载（优先码云镜像）
      - name: Build Linux
        run: npx electron-builder --linux AppImage deb tar.xz --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/MiMo-Studio-*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/MiMo-Studio-*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar-xz
          path: release/MiMo-Studio-*-linux-*.tar.xz

  # ── Windows (NSIS) ───────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npx vite build
      # 不内置 MiMo CLI — 用户首次启动时自动下载（优先码云镜像）
      - name: Build Windows
        run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: release/MiMo-Studio-Setup-*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/MiMo-Studio-*-win-*-Portable.tar.xz

  # ── Gitee Release (aggregator) ───────────────────────────
  gitee-release:
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          TAG_NUM="${TAG#v}"
          API_BASE="https://gitee.com/api/v5/repos/shdowzh/mimo-studio"
          TOKEN="$GITEE_TOKEN"

          echo "==> Tag: $TAG  Version: $TAG_NUM"

          # 1. Find or create release
          RELEASES=$(curl -s "$API_BASE/releases?access_token=$TOKEN&per_page=50")
          RELEASE_ID=$(echo "$RELEASES" | jq -r '.[] | select(.tag_name=="'"$TAG"'") | .id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "==> Creating Gitee release for $TAG..."
            RESP=$(curl -s -X POST "$API_BASE/releases?access_token=$TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"MiMo Studio $TAG_NUM\",\"body\":\"Release $TAG_NUM\",\"prerelease\":false,\"target_commitish\":\"main\"}")
            RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ]; then
              echo "ERROR: Failed to create release. Response:"
              echo "$RESP" | head -5
              exit 1
            fi
          fi
          echo "==> Release ID: $RELEASE_ID"

          # 2. Upload all assets (skip > 100MB for Gitee limit)
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.xz" \) | while read -r f; do
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -gt 104857600 ]; then
              echo "SKIP (>100MB): $f ($(( SIZE / 1048576 ))MB)"
            else
              echo "UPLOAD: $f ($(( SIZE / 1048576 ))MB)"
              curl -s -X POST "$API_BASE/releases/$RELEASE_ID/attach_files?access_token=$TOKEN" \
                -F "file=@$f" | jq -r '.name + " -> " + .browser_download_url'
            fi
          done
          echo "==> Done."
