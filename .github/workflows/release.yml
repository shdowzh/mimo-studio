name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS (x64 + arm64) ──────────────────────────────────
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npx vite build
      - name: Download bundled MiMo CLI (${{ matrix.arch }})
        run: |
          mkdir -p cli/darwin-${{ matrix.arch }}
          ASSET="mimocode-darwin-${{ matrix.arch }}.zip"
          curl -L -o /tmp/mimo.zip "https://github.com/XiaomiMiMo/MiMo-Code/releases/latest/download/$ASSET"
          unzip -o /tmp/mimo.zip -d cli/darwin-${{ matrix.arch }}
          chmod +x cli/darwin-${{ matrix.arch }}/mimo
      - name: Build macOS (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: release/MiMo-Studio-*.dmg

  # ── Linux (AppImage + deb) ───────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: |
          sudo apt-get update && sudo apt-get install -y ruby
          sudo gem install fpm
      - run: npm install
      - run: npx vite build
      - name: Download bundled MiMo CLI (Linux x64)
        run: |
          mkdir -p cli/linux-x64
          curl -L -o /tmp/mimo.tar.gz "https://github.com/XiaomiMiMo/MiMo-Code/releases/latest/download/mimocode-linux-x64.tar.gz"
          tar -xzf /tmp/mimo.tar.gz -C cli/linux-x64
          chmod +x cli/linux-x64/mimo
      - name: Build Linux
        run: npx electron-builder --linux AppImage deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/MiMo-Studio-*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/MiMo-Studio-*.deb

  # ── Windows (NSIS) ───────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npx vite build
      - name: Download bundled MiMo CLI (Windows x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path cli\windows-x64
          Invoke-WebRequest -Uri "https://github.com/XiaomiMiMo/MiMo-Code/releases/latest/download/mimocode-windows-x64.zip" -OutFile mimo.zip
          Expand-Archive -Path mimo.zip -DestinationPath cli\windows-x64 -Force
      - name: Build Windows
        run: npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/MiMo-Studio-Setup-*.exe

  # ── Gitee Release (aggregator) ───────────────────────────
  gitee-release:
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"

          # Find or create release
          RELEASE_ID=$(curl -s "https://gitee.com/api/v5/repos/shdowzh/mimo-studio/releases?access_token=$GITEE_TOKEN" | \
            python3 -c "import sys,json; releases=json.load(sys.stdin); print(next((r['id'] for r in releases if r['tag_name']==sys.argv[1]), ''))" "${{ github.ref_name }}")

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -s -X POST "https://gitee.com/api/v5/repos/shdowzh/mimo-studio/releases?access_token=$GITEE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"${{ github.ref_name }}\",\"name\":\"MiMo Studio $TAG\",\"body\":\"Release $TAG\"}" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          fi

          echo "Release ID: $RELEASE_ID"

          # Upload all assets (skip files > 100MB for Gitee)
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) | while read f; do
            SIZE=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 104857600 ]; then
              echo "Skipping (>$100MB): $f ($(echo "scale=1; $SIZE/1048576" | bc)MB)"
            else
              echo "Uploading: $f"
              curl -s -X POST \
                "https://gitee.com/api/v5/repos/shdowzh/mimo-studio/releases/$RELEASE_ID/attach_files?access_token=$GITEE_TOKEN" \
                -F "file=@$f"
            fi
          done
